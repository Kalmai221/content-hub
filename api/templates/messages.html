{% extends "base.html" %}

{% block title %}Messages - Effexor Hub{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-2 sm:px-4 py-4 sm:py-8">
    <!-- Header -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#21525D] to-[#317888] flex items-center justify-center flex-shrink-0">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3-3-3z"/>
                </svg>
            </div>
            <div>
                <h2 class="text-2xl sm:text-3xl font-bold text-gray-200">Messages</h2>
                <p class="text-sm text-gray-400">Chat with support</p>
            </div>
        </div>
    </div>

    <!-- Chat Container -->
    <div id="chatContainer" style="background: rgb(18,18,20); border: 1px solid rgba(255,255,255,0.08); border-radius: 1rem; display: flex; flex-direction: column; height: 70vh; min-height: 420px; overflow: hidden;">

        <!-- Chat Header -->
        <div style="padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.03); flex-shrink: 0;">
            <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #21525D, #317888); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                <svg style="width: 16px; height: 16px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
            <div>
                <div style="font-size: 0.875rem; font-weight: 600; color: #e5e7eb;">Support Team</div>
                <div style="font-size: 0.7rem; color: #6b7280;">Admin</div>
            </div>
            <div style="margin-left: auto; display: flex; align-items: center; gap: 6px;">
                <div style="width: 8px; height: 8px; border-radius: 50%; background: #4ade80;"></div>
                <span style="font-size: 0.7rem; color: #6b7280;">Live</span>
            </div>
        </div>

        <!-- Messages Scroll Area -->
        <div id="messagesContainer" style="flex: 1; overflow-y: auto; padding: 16px; min-height: 0;">
            <div id="loadingMessages" style="display: flex; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; color: #6b7280; font-size: 0.875rem;">
                <svg style="width: 16px; height: 16px; animation: spin 1s linear infinite;" fill="none" viewBox="0 0 24 24">
                    <circle style="opacity: 0.25;" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path style="opacity: 0.75;" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Loading messages...
            </div>
            <div id="emptyState" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; text-align: center;">
                <div style="width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin-bottom: 12px;">
                    <svg style="width: 32px; height: 32px; color: #4b5563;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <div style="color: #9ca3af; font-weight: 500; font-size: 0.9rem;">No messages yet</div>
                <div style="color: #6b7280; font-size: 0.8rem; margin-top: 4px;">Send a message to get started</div>
            </div>
            <div id="messagesList"></div>
        </div>

        <!-- Input Area -->
        <div style="padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.02); flex-shrink: 0;">
            <div style="display: flex; align-items: flex-end; gap: 8px;">
                <textarea
                    id="messageInput"
                    placeholder="Type a message..."
                    rows="1"
                    style="flex: 1; padding: 10px 14px; border-radius: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #e5e7eb; font-size: 0.875rem; resize: none; outline: none; max-height: 120px; font-family: inherit; line-height: 1.5; transition: border-color 0.15s;"
                    onfocus="this.style.borderColor='#317888'"
                    onblur="this.style.borderColor='rgba(255,255,255,0.1)'"
                    onkeydown="handleKeyDown(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button
                    id="sendBtn"
                    onclick="sendMessage()"
                    style="width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg, #21525D, #317888); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s;"
                    onmouseenter="this.style.opacity='0.85'"
                    onmouseleave="this.style.opacity='1'"
                >
                    <svg style="width: 18px; height: 18px; color: white;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
const currentUserId = "{{ session.get('user_id') }}";
let lastMessageId = null;
let pollingInterval = null;

function formatTime(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diffDays = Math.floor((now - date) / 86400000);
    if (diffDays === 0) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (diffDays === 1) return 'Yesterday ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(String(text)));
    return d.innerHTML;
}

function renderMessage(msg) {
    const isOut = msg.sender_id === currentUserId;

    const wrapper = document.createElement('div');
    wrapper.dataset.msgId = msg._id;
    wrapper.style.cssText = 'display: flex; flex-direction: column; align-items: ' + (isOut ? 'flex-end' : 'flex-start') + '; margin-bottom: 10px;';

    const bubble = document.createElement('div');
    bubble.style.cssText = [
        'max-width: 72%;',
        'padding: 9px 14px;',
        'font-size: 0.875rem;',
        'line-height: 1.5;',
        'word-break: break-word;',
        'white-space: pre-wrap;',
        isOut
            ? 'background: linear-gradient(135deg,#21525D,#317888); color: #fff; border-radius: 14px 4px 14px 14px;'
            : 'background: rgba(255,255,255,0.07); color: #e5e7eb; border-radius: 4px 14px 14px 14px;'
    ].join('');

    if (!isOut) {
        const sender = document.createElement('div');
        sender.style.cssText = 'font-size: 0.68rem; font-weight: 700; color: #5eead4; margin-bottom: 3px; white-space: nowrap;';
        sender.textContent = msg.sender_username;
        bubble.appendChild(sender);
    }

    const text = document.createElement('div');
    text.textContent = msg.content;
    bubble.appendChild(text);

    const time = document.createElement('div');
    time.style.cssText = 'font-size: 0.62rem; color: #6b7280; margin-top: 3px;' + (isOut ? ' text-align: right;' : '');
    time.textContent = formatTime(msg.created_at);

    wrapper.appendChild(bubble);
    wrapper.appendChild(time);
    document.getElementById('messagesList').appendChild(wrapper);
}

function scrollToBottom(smooth = true) {
    const c = document.getElementById('messagesContainer');
    c.scrollTo({ top: c.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
}

async function loadMessages() {
    try {
        const res = await fetch('/api/messages');
        const data = await res.json();
        document.getElementById('loadingMessages').style.display = 'none';
        document.getElementById('messagesList').innerHTML = '';

        if (!data.messages || data.messages.length === 0) {
            document.getElementById('emptyState').style.display = 'flex';
        } else {
            document.getElementById('emptyState').style.display = 'none';
            data.messages.forEach(msg => renderMessage(msg));
            lastMessageId = data.messages[data.messages.length - 1]._id;
        }
        scrollToBottom(false);
    } catch (err) {
        document.getElementById('loadingMessages').innerHTML = '<p style="color:#f87171;font-size:0.875rem">Failed to load messages</p>';
    }
}

async function pollNewMessages() {
    if (!lastMessageId) { await loadMessages(); return; }
    try {
        const res = await fetch(`/api/messages/poll?after=${encodeURIComponent(lastMessageId)}`);
        const data = await res.json();
        if (data.messages && data.messages.length > 0) {
            const c = document.getElementById('messagesContainer');
            const atBottom = c.scrollHeight - c.scrollTop - c.clientHeight < 60;
            document.getElementById('emptyState').style.display = 'none';
            data.messages.forEach(msg => renderMessage(msg));
            lastMessageId = data.messages[data.messages.length - 1]._id;
            if (atBottom) scrollToBottom();
        }
    } catch (err) { /* silent */ }
}

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    if (!content) return;
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.style.opacity = '0.5';
    input.value = '';
    autoResize(input);

    try {
        const res = await fetch('/api/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('emptyState').style.display = 'none';
            renderMessage(data.message);
            lastMessageId = data.message._id;
            scrollToBottom();
        }
    } catch (err) {
        input.value = content;
        autoResize(input);
    } finally {
        btn.disabled = false;
        btn.style.opacity = '1';
        input.focus();
    }
}

function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

loadMessages();
pollingInterval = setInterval(pollNewMessages, 2500);
window.addEventListener('beforeunload', () => clearInterval(pollingInterval));
</script>
{% endblock %}
